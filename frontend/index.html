<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Freight System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>🚛 Logistics Freight System</h1>

        <div class="card">
            <h2>Cadastro de Frete</h2>

            <input id="origem" type="text" placeholder="Origem">
            <input id="destino" type="text" placeholder="Destino">
            <input id="peso" type="text" placeholder="Peso (kg)">


            <button id="btnCadastrar" onclick="cadastrarFrete()">
                Cadastrar
            </button>
        </div>

        <div class="dashboard">
            <div class="kpi-card">
                <span>Total de Fretes</span>
                <strong id="totalFretes">0</strong>
            </div>

            <div class="kpi-card">
                <span>Faturamento Total</span>
                <strong id="faturamentoTotal">R$ 0,00</strong>
            </div>

            <div class="kpi-card">
                <span>Peso Total</span>
                <strong id="pesoTotal">0 kg</strong>
            </div>

            <div class="kpi-card">
                <span>Ticket Médio</span>
                <strong id="ticketMedio">R$ 0,00</strong>
            </div>
        </div>

        <div class="card">
            <h2>Fretes por Destino</h2>
            <div id="graficoDestinos"></div>
        </div>

        <div class="card">
            <h2>Fretes Cadastrados</h2>

            <input id="filtroFretes" type="text" placeholder="Filtrar por origem ou destino..."
                oninput="filtrarFretes()">

            <div id="listaFretes"></div>
        </div>
    </div>
    <script src="script.js"></script>

</body>

</html>
