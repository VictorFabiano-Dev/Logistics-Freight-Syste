<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Freight System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🚛 Logistics Freight System</h1>

    <div class="card">    
        <h2>Cadastro de Frete</h2>

        <button onclick="cadastrarFrete()">
            Cadastrar

    <div class="card">
        <h2>Fretes Cadastrados</h2>
        <div id="listaFretes"></div>
    </div>
    </div>

</body>
</html>
